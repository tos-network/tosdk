name: 2046 Compatibility
on:
  push:
    paths:
      - 'src/types/boundary.ts'
      - 'src/types/client.ts'
      - 'src/clients/createPublicClient.ts'
      - 'test/boundary-compat.test.ts'
      - 'package.json'
  pull_request:
    paths:
      - 'src/types/boundary.ts'
      - 'src/types/client.ts'
      - 'src/clients/createPublicClient.ts'
      - 'test/boundary-compat.test.ts'
      - 'package.json'

jobs:
  boundary-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: npx vitest run test/boundary-compat.test.ts --reporter=verbose
